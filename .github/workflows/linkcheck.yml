# docs/ 配下のHTMLに含まれる外部リンクの生存検査
# - push時(docs/** 変更時)と毎週月曜 6:00 JST(日曜 21:00 UTC)に実行
# - リンク切れがあってもワークフローは失敗させず、GitHub Issue を立てるだけ
name: linkcheck

on:
  push:
    paths:
      - "docs/**"
  schedule:
    - cron: "0 21 * * 0" # 毎週月曜 6:00 JST
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check external links (lychee)
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --scheme で http/https に限定 = 外部リンクのみ検査(内部リンクは scripts/check.sh が担当)
          args: >-
            --no-progress
            --scheme https --scheme http
            --max-concurrency 4
            --timeout 20
            --max-retries 2
            --accept 200..=299,403,429
            'docs/**/*.html'
          output: ./lychee-report.md
          fail: false

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "外部リンク切れの検出(lychee 自動検査)"
          content-filepath: ./lychee-report.md
          labels: |
            linkcheck
            automated
